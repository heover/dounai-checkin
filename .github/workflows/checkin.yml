name: 豆奶自动签到

on:
  schedule:
    # 每天北京时间 00:07 (UTC 16:07)
    - cron: "7 16 * * *"
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 执行签到
        env:
          DOUNAI_EMAIL: ${{ secrets.DOUNAI_EMAIL }}
          DOUNAI_PASSWD: ${{ secrets.DOUNAI_PASSWD }}
          SERVER_UID: ${{ secrets.SERVER_UID }}
          SERVER_KEY: ${{ secrets.SERVER_KEY }}
        run: node scripts/checkin.mjs
